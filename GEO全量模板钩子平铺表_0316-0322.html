const tbody = document.getElementById('tbody');
let html = '';
let currentCat = '';
let currentIntent = '';

DATA.forEach(item => {
  item.hooks.forEach((hook, hi) => {
    const showCat = (currentCat !== item.cat + item.intent + item.tpl);
    if (currentCat !== item.cat + item.intent + item.tpl) currentCat = item.cat + item.intent + item.tpl;

    html += `<tr data-cat="${item.cat}">
      <td>${hi===0 ? `<span class="tag ${item.catTag}">${item.cat}</span>` : ''}</td>
      <td>${hi===0 ? item.intent : ''}</td>
      <td>${hi===0 ? item.tpl : ''}</td>
      <td>
        <span class="hook-id">${hook.id}</span>
        <span class="hook-text">${hook.text}</span>
        <span class="hook-example">${hook.ex}</span>
      </td>
    </tr>`;
  });
});

tbody.innerHTML = html;

// Count rows
function updateCount(){
  const visible = document.querySelectorAll('#tbody tr:not([style*="display: none"])').length;
  document.getElementById('rowCount').textContent = `共 ${visible} 行`;
}
updateCount();

// Filter
function filterCat(cat){
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('on'));
  event.target.classList.add('on');
  document.querySelectorAll('#tbody tr').forEach(tr => {
    if(cat === 'all') { tr.style.display = ''; }
    else { tr.style.display = tr.dataset.cat === cat ? '' : 'none'; }
  });
  updateCount();
}
